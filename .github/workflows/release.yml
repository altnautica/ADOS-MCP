name: Release

# Publishes the npm package on a version tag. The npm token is a repo secret
# (NPM_TOKEN). The package is public. A tag is only pushed after the release
# checklist passes locally.
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck && pnpm lint && pnpm test && pnpm build
      - name: Clean-for-public sweep
        run: bash scripts/clean-for-public.sh
      - name: Publish to npm
        if: ${{ env.NPM_TOKEN != '' }}
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
